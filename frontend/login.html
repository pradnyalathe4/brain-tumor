<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NeuroScan AI</title>
    <meta name="api-base-url" content="http://localhost:8000">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        medical: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gradient-to-br from-medical-50 to-medical-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-medical-600 rounded-full mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-medical-900">NeuroScan AI</h1>
            <p class="text-gray-600 mt-2">Brain Tumor Detection System</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="flex border-b border-gray-200 mb-6">
                <button id="loginTab" class="flex-1 py-3 text-center font-medium text-medical-600 border-b-2 border-medical-600 transition-colors" onclick="showLogin()">Sign In</button>
                <button id="registerTab" class="flex-1 py-3 text-center font-medium text-gray-500 border-b-2 border-transparent hover:text-medical-600 transition-colors" onclick="showRegister()">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-5">
                <div>
                    <label for="loginEmail" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="loginEmail" name="email" required autocomplete="email"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-medical-500 focus:border-medical-500 transition-colors"
                        aria-describedby="loginEmailError">
                    <p id="loginEmailError" class="mt-1 text-sm text-red-600 hidden" role="alert"></p>
                </div>
                <div>
                    <label for="loginPassword" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="loginPassword" name="password" required autocomplete="current-password"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-medical-500 focus:border-medical-500 transition-colors"
                        aria-describedby="loginPasswordError">
                    <p id="loginPasswordError" class="mt-1 text-sm text-red-600 hidden" role="alert"></p>
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-medical-600 hover:bg-medical-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    Sign In
                </button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="space-y-5 hidden">
                <div>
                    <label for="registerName" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="registerName" name="name" required autocomplete="name"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-medical-500 focus:border-medical-500 transition-colors"
                        aria-describedby="registerNameError">
                    <p id="registerNameError" class="mt-1 text-sm text-red-600 hidden" role="alert"></p>
                </div>
                <div>
                    <label for="registerEmail" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="registerEmail" name="email" required autocomplete="email"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-medical-500 focus:border-medical-500 transition-colors"
                        aria-describedby="registerEmailError">
                    <p id="registerEmailError" class="mt-1 text-sm text-red-600 hidden" role="alert"></p>
                </div>
                <div>
                    <label for="registerPassword" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="registerPassword" name="password" required autocomplete="new-password" minlength="6"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-medical-500 focus:border-medical-500 transition-colors"
                        aria-describedby="registerPasswordError">
                    <p id="registerPasswordError" class="mt-1 text-sm text-red-600 hidden" role="alert"></p>
                </div>
                <button type="submit" id="registerBtn" class="w-full bg-medical-600 hover:bg-medical-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    Create Account
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-500">
                <p>Demo credentials: <span class="font-mono text-medical-600">doctor@demo.com</span> / <span class="font-mono text-medical-600">demo123</span></p>
            </div>
        </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginTab').classList.add('text-medical-600', 'border-medical-600');
            document.getElementById('loginTab').classList.remove('text-gray-500', 'border-transparent');
            document.getElementById('registerTab').classList.remove('text-medical-600', 'border-medical-600');
            document.getElementById('registerTab').classList.add('text-gray-500', 'border-transparent');
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('registerTab').classList.add('text-medical-600', 'border-medical-600');
            document.getElementById('registerTab').classList.remove('text-gray-500', 'border-transparent');
            document.getElementById('loginTab').classList.remove('text-medical-600', 'border-medical-600');
            document.getElementById('loginTab').classList.add('text-gray-500', 'border-transparent');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            
            try {
                const response = await fetchAuthLogin(email, password);
                sessionStorage.setItem('neuroscan_token', response.access_token);
                sessionStorage.setItem('neuroscan_doctor', JSON.stringify(response.doctor));
                showToast('Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const btn = document.getElementById('registerBtn');
            
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            
            try {
                const response = await fetchAuthRegister(name, email, password);
                sessionStorage.setItem('neuroscan_token', response.access_token);
                sessionStorage.setItem('neuroscan_doctor', JSON.stringify(response.doctor));
                showToast('Account created! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
