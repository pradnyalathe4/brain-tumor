{% extends "base.html" %}
{% block title %}404 - Page Not Found{% endblock %}

{% set show_sidebar = false %}

{% block auth_content %}
<div class="error-page">
    <div class="error-card">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/dashboard" class="btn btn-primary">Go to Dashboard</a>
    </div>
</div>

<style>
.error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--bg) 0%, #1a1a2e 100%); }
.error-card { text-align: center; padding: 48px; }
.error-card h1 { font-size: 120px; color: var(--primary); margin: 0; line-height: 1; }
.error-card h2 { color: var(--text); font-size: 32px; margin: 16px 0; }
.error-card p { color: var(--text-muted); font-size: 18px; margin-bottom: 32px; }
</style>
{% endblock %}
